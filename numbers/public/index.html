<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>HusbandLabs · numbers</title>
<style>
  :root { color-scheme:dark; --bg:#0c0d10; --card:#15171c; --card2:#1b1e25; --br:#262a31;
    --ink:#e8eaed; --muted:#8b919b; --accent:#8b5cf6; --ok:#34d399; --warn:#fbbf24; --bad:#f87171; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  header { padding:20px 24px 0; }
  header h1 { margin:0; font-size:17px; font-weight:600; }
  header .sub { color:var(--muted); font-size:12px; }
  .tabs { display:flex; gap:6px; padding:14px 24px 0; border-bottom:1px solid var(--br); }
  .tab { padding:8px 16px; cursor:pointer; font-size:13px; font-weight:600; color:var(--muted);
    border:1px solid transparent; border-bottom:none; border-radius:8px 8px 0 0; }
  .tab.active { color:var(--ink); background:var(--card); border-color:var(--br); }
  .panel { display:none; }
  .panel.active { display:block; }
  .totals { display:flex; gap:28px; padding:18px 24px; flex-wrap:wrap; border-bottom:1px solid var(--br); }
  .tot .n { font-size:24px; font-weight:700; }
  .tot .l { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .featured { margin:20px 24px; background:linear-gradient(180deg,#1c1830,#15171c);
    border:1px solid #3a2f63; border-radius:14px; padding:18px 20px; }
  .featured .ftitle { font-size:16px; font-weight:700; }
  .featured .ftitle a { color:var(--ink); text-decoration:none; }
  .featured .ftitle a:hover { color:var(--accent); }
  .featured .row { display:flex; gap:30px; flex-wrap:wrap; margin:14px 0; align-items:flex-start; }
  .bignums { display:flex; gap:26px; }
  .bignums .v { font-size:30px; font-weight:800; }
  .bignums .k { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .trend { font-size:12px; font-weight:700; padding:2px 9px; border-radius:10px; align-self:center; }
  .trend.up { background:#34d39922; color:var(--ok); } .trend.flat { background:#8b919b22; color:var(--muted); }
  .trend.down { background:#f8717122; color:var(--bad); }
  .cols { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media (max-width:760px){ .cols{ grid-template-columns:1fr; } }
  .colh { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 6px; }
  .pages { list-style:none; margin:0; padding:0; }
  .pages li { display:flex; justify-content:space-between; gap:10px; padding:3px 0; font-size:12.5px; }
  .pages li a { color:var(--accent); text-decoration:none; font-family:ui-monospace,monospace;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:80%; }
  .pages li a:hover { text-decoration:underline; }
  .pages li .pv { color:var(--muted); flex-shrink:0; }
  .appcard { background:var(--card2); border:1px solid var(--br); border-radius:10px; padding:12px 14px; }
  .appcard h4 { margin:0 0 3px; font-size:13px; }
  .appcard .meta { font-size:11px; color:var(--muted); }
  .appcard .badge { display:inline-block; margin-top:7px; font-size:11px; padding:2px 8px; border-radius:10px; }
  .badge.live { background:#34d39922; color:var(--ok); } .badge.dev { background:#fbbf2422; color:var(--warn); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:14px; padding:20px 24px; }
  .site { background:var(--card); border:1px solid var(--br); border-radius:10px; padding:14px 16px; }
  .site h2 { margin:0 0 8px; font-size:14px; font-weight:600; }
  .site h2 a { color:var(--ink); text-decoration:none; } .site h2 a:hover { color:var(--accent); }
  .nums { display:flex; gap:18px; margin-bottom:10px; }
  .nums .v { font-size:18px; font-weight:700; } .nums .k { font-size:10px; color:var(--muted); text-transform:uppercase; }
  .pages.mini { border-top:1px solid var(--br); padding-top:7px; }
  .section-label { padding:4px 24px 0; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
  .stglist { padding:20px 24px; }
  .stglist a { display:block; padding:10px 14px; margin-bottom:8px; background:var(--card);
    border:1px solid var(--br); border-radius:8px; color:var(--accent); text-decoration:none;
    font-family:ui-monospace,monospace; font-size:13px; }
  .stglist a:hover { border-color:var(--accent); }
  .stglist .tag { float:right; color:var(--muted); font-family:-apple-system,sans-serif; font-size:11px; }
  footer { padding:18px 24px 44px; color:var(--muted); font-size:11px; }
</style>
</head>
<body>
<header>
  <h1>HusbandLabs · numbers</h1>
  <div class="sub" id="gen">loading…</div>
</header>
<div class="tabs">
  <div class="tab active" data-tab="overview">Overview</div>
  <div class="tab" data-tab="purecalc">PureCalc Build</div>
  <div class="tab" data-tab="staging">Staging</div>
</div>

<section class="panel active" id="p-overview">
  <div class="totals" id="totals"></div>
  <div class="featured" id="featured"></div>
  <div class="section-label">Other apps</div>
  <div class="grid" id="apps"></div>
  <div class="section-label">Other sites</div>
  <div class="grid" id="sites"></div>
</section>

<section class="panel" id="p-purecalc">
  <div style="padding:10px 24px;color:var(--muted);font-size:12px">
    PureCalculators calc-status dashboard — live data (status / checklist /
    top-earners) proxied from purecalculators.com, refreshed every PC deploy.
  </div>
  <iframe id="pcframe" title="PureCalculators build dashboard" loading="lazy"
    style="width:100%;height:calc(100vh - 150px);border:0;background:#fff"></iframe>
</section>

<section class="panel" id="p-staging">
  <div class="stglist" id="staging"></div>
</section>

<footer id="foot"></footer>

<script>
const $ = s => document.querySelector(s)
const fmt = n => n == null ? '—' : n.toLocaleString()
// Trend = recent 7d daily rate vs the 28d daily rate. Only meaningful on real
// first-party data; CF estimates are too coarse, so suppress it there.
function trend(s){ if(s.src!=='first-party') return {c:'flat',t:''};
  const r7=s.pv7/7, r28=s.pv28/28; if(!r28) return {c:'flat',t:''};
  const d=(r7-r28)/r28; if(d>0.15) return {c:'up',t:'▲ '+Math.round(d*100)+'%'};
  if(d<-0.15) return {c:'down',t:'▼ '+Math.round(Math.abs(d)*100)+'%'}; return {c:'flat',t:'≈ steady'}; }
function srcBadge(s){ return s.src==='first-party' ? ''
  : `<span class="tag" title="No first-party analytics beacon on this site yet — no real data to show">no data</span>`; }
function pagesList(host, pages, cls){ return !pages||!pages.length
  ? '<li class="pv" style="color:var(--muted);font-style:italic">no page data</li>'
  : pages.map(p=>`<li><a href="https://${host}${p.path}" target="_blank" rel="noopener">${p.path}</a><span class="pv">${fmt(p.pv)}${p.v!=null?` · ${fmt(p.v)}v`:''}</span></li>`).join(''); }
// Inline sparkline of daily pageviews (real series data we already fetch).
function spark(series){ const a=(series||[]).map(x=>x.pv); if(a.length<2) return '';
  const w=180,h=34,mx=Math.max(...a,1),pts=a.map((v,i)=>`${(i/(a.length-1)*w).toFixed(1)},${(h-2-v/mx*(h-4)).toFixed(1)}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block">
    <polyline fill="none" stroke="var(--accent)" stroke-width="1.5" points="${pts}"/></svg>`; }
// Honest delta: last 7 full days vs the 7 before. Blank unless ≥14 days exist.
function delta7(series){ const a=(series||[]).map(x=>x.pv); if(a.length<14) return {c:'flat',t:''};
  const last=a.slice(-7).reduce((x,y)=>x+y,0), prev=a.slice(-14,-7).reduce((x,y)=>x+y,0);
  if(!prev) return {c:'flat',t:''}; const d=(last-prev)/prev;
  if(d>0.05) return {c:'up',t:'▲ '+Math.round(d*100)+'% vs prior 7d'};
  if(d<-0.05) return {c:'down',t:'▼ '+Math.round(Math.abs(d)*100)+'% vs prior 7d'};
  return {c:'flat',t:'≈ flat vs prior 7d'}; }
function miniList(items, keyf){ return !items||!items.length
  ? '<li class="pv" style="color:var(--muted);font-style:italic">—</li>'
  : items.map(x=>`<li><span>${keyf(x)}</span><span class="pv">${fmt(x.pv)}</span></li>`).join(''); }
function appCard(a){ const live = a.listed && /live/i.test(a.status||'');
  const counts = (a.installs28!=null)
    ? `<div class="nums"><div><div class="v">${fmt(a.installs7)}</div><div class="k">inst 7d</div></div><div><div class="v">${fmt(a.installs28)}</div><div class="k">inst 28d</div></div></div>`
    : '';
  return `<div class="appcard"><h4>${a.name}</h4><div class="meta">${a.bundle}${a.builds!=null?` · ${a.builds} builds`:''}</div>${counts}
    <span class="badge ${live?'live':'dev'}">${a.status}${a.installs28==null?' · installs n/a':''}</span></div>`; }

fetch('./data.json?'+Date.now()).then(r=>r.json()).then(d=>{
  const dq = d.dataQuality==='first-party'
    ? '<span class="tag" style="background:#16341f;color:#7ee2a8">first-party</span>'
    : '<span class="tag" title="No first-party data yet — beacon collecting">no data yet</span>';
  $('#gen').innerHTML = 'updated '+new Date(d.generated).toLocaleString()+' · '+d.totals.siteCount+' live sites · '+d.staging.length+' staging · '+dq;
  $('#totals').innerHTML = `
    <div class="tot"><div class="n">${fmt(d.totals.pv7)}</div><div class="l">pageviews · 7d</div></div>
    <div class="tot"><div class="n">${fmt(d.totals.pv28)}</div><div class="l">pageviews · 28d</div></div>
    <div class="tot"><div class="n">${fmt(d.totals.visitors28)}</div><div class="l">visitors · 28d</div></div>
    <div class="tot"><div class="n">${d.totals.siteCount}</div><div class="l">live sites</div></div>`;

  // Featured: PureCalculators
  const pc = d.purecalculators, s = pc.site, det = pc.detail;
  if (s) {
    const t = (det && det.series && det.series.length >= 14) ? delta7(det.series) : trend(s);
    const sk = det && det.series ? spark(det.series) : '';
    const who = det ? `
        <div>
          <p class="colh">Top referrers (28d)</p>
          <ul class="pages">${miniList(det.topReferrers, x=>x.ref)}</ul>
        </div>
        <div>
          <p class="colh">Countries (28d)</p>
          <ul class="pages">${miniList(det.topCountries, x=>x.country)}</ul>
        </div>
        <div>
          <p class="colh">Devices (28d)</p>
          <ul class="pages">${miniList(det.devices, x=>x.device)}</ul>
        </div>` : '';
    $('#featured').innerHTML = `
      <div class="ftitle"><a href="https://${s.host}/" target="_blank" rel="noopener">★ PureCalculators</a> ${srcBadge(s)}</div>
      <div class="row">
        <div class="bignums">
          <div><div class="v">${fmt(s.pv7)}</div><div class="k">pv · 7-day</div></div>
          <div><div class="v">${fmt(s.pv28)}</div><div class="k">pv · 28-day</div></div>
          <div><div class="v">${fmt(s.visitors28)}</div><div class="k">visitors · 28d</div></div>
          <span class="trend ${t.c}">${t.t}</span>
        </div>
        ${sk ? `<div style="flex:1;min-width:180px;max-width:340px"><div class="k" style="margin-bottom:4px">daily pageviews (${det.series.length}d)</div>${sk}</div>` : ''}
      </div>
      <div class="cols">
        <div>
          <p class="colh">Top pages (28d)</p>
          <ul class="pages">${pagesList(s.host, s.topPages)}</ul>
        </div>
        ${who}
        <div>
          <p class="colh">Companion apps</p>
          ${pc.apps.map(appCard).join('') || '<div class="meta">none</div>'}
        </div>
      </div>`;
  }

  $('#apps').innerHTML = d.apps.map(appCard).join('') || '<div class="section-label">none</div>';

  $('#sites').innerHTML = d.sites.map(s=>{ const t=trend(s);
    return `<div class="site">
      <h2><a href="https://${s.host}/" target="_blank" rel="noopener">${s.host}</a> ${srcBadge(s)}</h2>
      <div class="nums">
        <div><div class="v">${fmt(s.pv7)}</div><div class="k">pv 7d</div></div>
        <div><div class="v">${fmt(s.pv28)}</div><div class="k">pv 28d</div></div>
        ${s.visitors28!=null?`<div><div class="v">${fmt(s.visitors28)}</div><div class="k">vis 28d</div></div>`:''}
        <span class="trend ${t.c}">${t.t}</span>
      </div>
      <ul class="pages mini">${pagesList(s.host, (s.topPages||[]).slice(0,6))}</ul>
    </div>`; }).join('');

  // Staging tab
  const stg = [
    ...d.stagingLinks.map(l=>({url:l.url, label:l.label, tag:'curated'})),
    ...d.staging.map(s=>({url:'https://'+s.host+'/', label:s.host, tag:'staging'}))
  ];
  const seen=new Set();
  $('#staging').innerHTML = stg.filter(x=>!seen.has(x.url)&&seen.add(x.url))
    .map(x=>`<a href="${x.url}" target="_blank" rel="noopener">${x.label}<span class="tag">${x.tag}</span></a>`).join('')
    || '<div class="meta">no staging environments</div>';

  $('#foot').textContent = 'Trend = 7-day vs 28-day daily rate. Cloudflare Web Analytics is sampled — directional. '
    + 'Ephemeral previews (hashed subdomains) are excluded. noindex · password-gated.';
}).catch(e=>{ $('#gen').textContent='data.json failed: '+e.message; });

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  $('#p-'+t.dataset.tab).classList.add('active');
  if(t.dataset.tab==='purecalc'){const f=$('#pcframe');if(!f.src)f.src='/numbers/pc/';}
}));
</script>
</body>
</html>
