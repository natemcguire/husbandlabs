<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>HusbandLabs · numbers</title>
<style>
  :root {
    color-scheme: dark;
    --bg:#0c0d10; --card:#15171c; --br:#262a31; --ink:#e8eaed; --muted:#8b919b;
    --accent:#8b5cf6; --ok:#34d399; --warn:#fbbf24; --bad:#f87171;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  header { padding:20px 24px; border-bottom:1px solid var(--br); display:flex;
    align-items:baseline; gap:18px; flex-wrap:wrap; }
  header h1 { margin:0; font-size:17px; font-weight:600; letter-spacing:.02em; }
  header .sub { color:var(--muted); font-size:12px; }
  .totals { display:flex; gap:28px; padding:16px 24px; flex-wrap:wrap;
    border-bottom:1px solid var(--br); }
  .tot { }
  .tot .n { font-size:24px; font-weight:700; }
  .tot .l { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
    gap:14px; padding:20px 24px; }
  .site { background:var(--card); border:1px solid var(--br); border-radius:10px;
    padding:14px 16px; }
  .site h2 { margin:0 0 2px; font-size:15px; font-weight:600; }
  .site h2 a { color:var(--ink); text-decoration:none; }
  .site h2 a:hover { color:var(--accent); }
  .nums { display:flex; gap:20px; margin:10px 0 12px; }
  .nums .v { font-size:20px; font-weight:700; }
  .nums .k { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .trend { font-size:12px; font-weight:600; padding:1px 7px; border-radius:10px; align-self:center; }
  .trend.up { background:#34d39922; color:var(--ok); }
  .trend.flat { background:#8b919b22; color:var(--muted); }
  .trend.down { background:#f8717122; color:var(--bad); }
  .pages { list-style:none; margin:0; padding:0; border-top:1px solid var(--br); padding-top:8px; }
  .pages li { display:flex; justify-content:space-between; gap:10px; padding:3px 0;
    font-size:12.5px; }
  .pages li a { color:var(--accent); text-decoration:none; font-family:ui-monospace,monospace;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pages li a:hover { text-decoration:underline; }
  .pages li .pv { color:var(--muted); flex-shrink:0; }
  .pages .empty { color:var(--muted); font-style:italic; font-size:12px; }
  .section-label { padding:8px 24px 0; font-size:11px; text-transform:uppercase;
    letter-spacing:.06em; color:var(--muted); }
  .apps { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:14px; padding:8px 24px 32px; }
  .app { background:var(--card); border:1px solid var(--br); border-radius:10px;
    padding:14px 16px; }
  .app h3 { margin:0 0 4px; font-size:14px; }
  .app .meta { font-size:11px; color:var(--muted); }
  .app .badge { display:inline-block; margin-top:8px; font-size:11px; padding:2px 8px;
    border-radius:10px; background:#fbbf2422; color:var(--warn); }
  footer { padding:16px 24px 40px; color:var(--muted); font-size:11px; }
</style>
</head>
<body>
<header>
  <h1>HusbandLabs · numbers</h1>
  <span class="sub" id="gen">loading…</span>
</header>
<div class="totals" id="totals"></div>
<div class="section-label">Websites — Cloudflare Web Analytics</div>
<div class="grid" id="sites"></div>
<div class="section-label">iOS apps — App Store Connect</div>
<div class="apps" id="apps"></div>
<footer id="foot"></footer>

<script>
const $ = s => document.querySelector(s)
const fmt = n => n == null ? '—' : n.toLocaleString()

function trendFor(pv7, pv28) {
  // daily rate over the 7d window vs daily rate over the 28d window
  const r7 = pv7 / 7, r28 = pv28 / 28
  if (r28 === 0) return { cls:'flat', txt:'—' }
  const delta = (r7 - r28) / r28
  if (delta > 0.1)  return { cls:'up',   txt:'▲ ' + Math.round(delta*100) + '%' }
  if (delta < -0.1) return { cls:'down', txt:'▼ ' + Math.round(Math.abs(delta)*100) + '%' }
  return { cls:'flat', txt:'≈ steady' }
}

fetch('./data.json?' + Date.now()).then(r => r.json()).then(d => {
  $('#gen').textContent = 'updated ' + new Date(d.generated).toLocaleString()
    + ' · ' + d.totals.siteCount + ' sites'

  $('#totals').innerHTML = `
    <div class="tot"><div class="n">${fmt(d.totals.pv7)}</div><div class="l">pageviews · 7d</div></div>
    <div class="tot"><div class="n">${fmt(d.totals.pv28)}</div><div class="l">pageviews · 28d</div></div>
    <div class="tot"><div class="n">${d.totals.siteCount}</div><div class="l">active sites</div></div>`

  $('#sites').innerHTML = d.sites.map(s => {
    const t = trendFor(s.pv7, s.pv28)
    const pages = (s.topPages && s.topPages.length)
      ? s.topPages.map(p => `<li><a href="https://${s.host}${p.path}" target="_blank" rel="noopener">${p.path}</a><span class="pv">${fmt(p.pv)}</span></li>`).join('')
      : `<li class="empty">below top-pages threshold</li>`
    return `<div class="site">
      <h2><a href="https://${s.host}/" target="_blank" rel="noopener">${s.host}</a></h2>
      <div class="nums">
        <div><div class="v">${fmt(s.pv7)}</div><div class="k">7-day</div></div>
        <div><div class="v">${fmt(s.pv28)}</div><div class="k">28-day</div></div>
        <span class="trend ${t.cls}">${t.txt}</span>
      </div>
      <ul class="pages">${pages}</ul>
    </div>`
  }).join('')

  $('#apps').innerHTML = d.apps.map(a => `
    <div class="app">
      <h3>${a.name}</h3>
      <div class="meta">${a.bundle}</div>
      ${a.metrics
        ? `<div class="nums"><div><div class="v">${fmt(a.metrics.installs)}</div><div class="k">installs</div></div></div>`
        : `<span class="badge">${a.status} · awaiting data</span>`}
    </div>`).join('')

  $('#foot').textContent = 'Trend = 7-day daily rate vs 28-day daily rate. '
    + 'Cloudflare Web Analytics is privacy-first and sampled; treat as directional. '
    + 'noindex — internal use only.'
}).catch(e => { $('#gen').textContent = 'data.json failed to load: ' + e.message })
</script>
</body>
</html>
